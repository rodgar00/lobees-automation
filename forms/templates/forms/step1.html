<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
    body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
    .form-container { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
    .brand-title { color: #0056ff; font-weight: 800; font-size: 2.5rem; margin: 0; text-transform: lowercase; }
    .step-title { color: #666; font-size: 0.9rem; margin-bottom: 30px; font-weight: 400; text-transform: uppercase; letter-spacing: 1px; }
    .form-group { text-align: left; margin-bottom: 20px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; font-size: 0.95rem; }
    select, input[type="date"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; font-family: inherit; box-sizing: border-box; outline: none; transition: border-color 0.3s; }
    select:focus, input[type="date"]:focus { border-color: #0056ff; }
    button { width: 100%; background-color: #0056ff; color: white; padding: 14px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background-color 0.3s; margin-top: 10px; }
    button:hover { background-color: #0041c2; }
</style>

<div class="form-container">
    <h1 class="brand-title">lobees</h1>
    <p class="step-title">Step 1 – First Contact</p>

    <form method="POST" action="/form/step1/submit/{{ lead_email }}/">
        {% csrf_token %}
        <input type="hidden" name="lead_email" value="{{ lead_email }}">

        <div class="form-group">
            <label>Are you still interested?</label>
            <select name="interested">
                <option value="true">Yes</option>
                <option value="false">No</option>
            </select>
        </div>

        <div class="form-group">
            <label>Would you like to reschedule?</label>
            <select name="reschedule">
                <option value="true">Yes</option>
                <option value="false">No</option>
            </select>
        </div>

        <div class="form-group">
            <label>Preferred date:</label>
            <input type="date" name="preferred_date">
        </div>

        <button type="submit">Submit</button>
    </form>
</div>
